<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gol de Prêmios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0d6efd, #0a58ca);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 360px;
    background: linear-gradient(#1e90ff, #0d6efd);
    border-radius: 20px;
    padding: 20px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    position: relative;
}

h1 {
    text-align: center;
    color: yellow;
    margin: 0;
}

.saldo-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
    margin: 15px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 20px;
}

.card {
    background: #2196f3;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.card.up {
    background: #00c853;
    transform: scale(1.1);
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.btn-chutar {
    background: orange;
    color: white;
}

.btn-resgatar {
    background: #ccc;
    color: #333;
    margin-top: 10px;
}

/* POPUP */

.popup-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 280px;
    animation: pop 0.3s ease;
}

.popup h2 {
    margin-top: 0;
    color: #0d6efd;
}

.popup button {
    background: #28a745;
    color: white;
    margin-top: 15px;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="container">
    <h1>GOL DE PRÊMIOS</h1>

    <div class="saldo-box">
        <div>
            <div>Saldo</div>
            <div id="saldo">R$ 00.00</div>
        </div>
        <div>
            <div>Mínimo</div>
            <div>R$ 130.00</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <button class="btn-chutar" onclick="chutar()">CHUTAR</button>
    <button class="btn-resgatar" id="resgatar" disabled>RESGATAR</button>
</div>

<!-- POPUP -->
<div class="popup-bg" id="popup">
    <div class="popup">
        <h2>🎉 Você está quase lá!</h2>
        <p>Seu saque está disponível!</p>
        <button onclick="fecharPopup()">RESGATAR AGORA</button>
    </div>
</div>

<script>
let saldo = 0;
let minimo = 130;
let valores = [70, 10, 5, 130, 15, 3, 30, 2, 1, 60, 20, 100];

function criarGrid() {
    const grid = document.getElementById("grid");
    valores.forEach((valor, index) => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = valor;
        div.id = "card-" + index;
        grid.appendChild(div);
    });
}

function atualizarGridAleatoriamente() {
    let index = Math.floor(Math.random() * valores.length);
    valores[index] += Math.floor(Math.random() * 20);
    let card = document.getElementById("card-" + index);
    card.innerText = valores[index];
    card.classList.add("up");
    setTimeout(() => card.classList.remove("up"), 300);
}

function chutar() {
    let premio = valores[Math.floor(Math.random() * valores.length)];
    saldo += premio / 50;
    document.getElementById("saldo").innerText = "R$ " + saldo.toFixed(2);

    atualizarGridAleatoriamente();

    if (saldo >= minimo - 5 && saldo < minimo) {
        document.getElementById("popup").style.display = "flex";
    }

    if (saldo >= minimo) {
        document.getElementById("resgatar").disabled = false;
        document.getElementById("resgatar").style.background = "green";
        document.getElementById("resgatar").style.color = "white";
    }
}

function fecharPopup() {
    document.getElementById("popup").style.display = "none";
}

criarGrid();
</script>

</body>
</html>
